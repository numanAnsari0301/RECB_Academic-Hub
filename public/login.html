<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECB | Admin Login</title>
  <meta name="description" content="Admin login for RECB student portal.">
  <link rel="stylesheet" href="style/main.css">
  <link rel="stylesheet" href="style/admin.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="/image/logo.png" alt="RECB Logo">
      <h2>Admin Portal</h2>
      <p>Rajkiya Engineering College Bijnor</p>
    </div>

    <div id="login-error" class="login-error">❌ Invalid username or password.</div>

    <form class="login-form" id="login-form" novalidate>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Username"
        autocomplete="username"
        required
      >
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Password"
        autocomplete="current-password"
        required
      >
      <button type="submit" class="btn btn-primary" id="login-btn" style="justify-content:center;padding:13px;">
        🔐 Login
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:0.8rem;color:var(--text-muted);">
      Contact the portal administrator if you need access.
    </p>

    <p style="text-align:center;margin-top:16px;">
      <a href="index.html" style="color:var(--primary);font-size:0.85rem;">← Back to Portal</a>
    </p>
  </div>
</div>

<script>
(function () {
  // Redirect if already logged in
  fetch('/api/auth/status').then(r => r.json()).then(json => {
    if (json.isAdmin) window.location.href = 'admin.html';
  });

  const form     = document.getElementById('login-form');
  const errEl    = document.getElementById('login-error');
  const loginBtn = document.getElementById('login-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.style.display = 'none';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Logging in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, password })
      });
      const json = await res.json();
      if (json.success) {
        window.location.href = 'admin.html';
      } else {
        errEl.style.display = 'block';
        errEl.textContent = '❌ ' + (json.error || 'Invalid credentials.');
        loginBtn.disabled = false;
        loginBtn.textContent = '🔐 Login';
      }
    } catch (_) {
      errEl.style.display = 'block';
      errEl.textContent = '❌ Could not connect to server.';
      loginBtn.disabled = false;
      loginBtn.textContent = '🔐 Login';
    }
  });
})();
</script>
</body>
</html>
